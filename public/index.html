<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>国名しりとり</title>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; --cell: 38px; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; color: #7f8c8d; font-size: 16px; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; align-items: center; }
        input[type="number"] { width: 50px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; background: var(--primary); color: white; font-weight: bold; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .grid { display: grid; gap: 2px; background: #34495e; padding: 3px; margin: auto; width: max-content; }
        .cell { width: var(--cell); height: var(--cell); background: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; user-select: none; touch-action: manipulation; }
        .cell.black { background: #2c3e50; color: transparent; }
        .cell.interactive { cursor: pointer; transition: background 0.1s; }
        .warning { color: #e74c3c; text-align: center; margin-top: 10px; }
        .solution-item { margin-top: 30px; text-align: center; border-top: 2px dashed #eee; padding-top: 20px; }
        select { padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#2c3e50;">Crossword Studio Pro</h2>
    
    <div class="controls">
        📚 辞書:
        <select id="dict-select">
            <option value="pokemon">ポケモン</option>
            <option value="countries">国名</option>
            <option value="capitals">首都</option>
            <option value="countries_capitals">国名・首都名</option>
        </select>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-gen" onclick="switchTab('generator')">自動生成</button>
        <button class="tab-btn" id="btn-sol" onclick="switchTab('solver')">解法モード</button>
    </div>

    <div id="generator" class="tab-content active">
        <div class="controls">
            行: <input type="number" id="gen-rows" value="8">
            列: <input type="number" id="gen-cols" value="8">
            <button onclick="runGenerator()">パズルを生成</button>
        </div>
        <div id="gen-grid" class="grid"></div>
    </div>

    <div id="solver" class="tab-content">
        <p style="text-align:center; font-size:13px; color:#666;">黒マスをタップして白マス（文字枠）に切り替えてください</p>
        <div class="controls">
            行: <input type="number" id="sol-rows" value="5" onchange="initSolverGrid()">
            列: <input type="number" id="sol-cols" value="5" onchange="initSolverGrid()">
            <button onclick="runSolver()">解を探索</button>
            <button style="background:#95a5a6" onclick="initSolverGrid()">リセット</button>
        </div>
        <div id="sol-grid-editor" class="grid"></div>
        <div id="solutions-list"></div>
    </div>
</div>

<script>
    let solverPattern = [];

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'generator') document.getElementById('btn-gen').classList.add('active');
        else {
            document.getElementById('btn-sol').classList.add('active');
            if(solverPattern.length === 0) initSolverGrid();
        }
    }

    async function runGenerator() {
        const rows = document.getElementById('gen-rows').value;
        const cols = document.getElementById('gen-cols').value;
        const btn = event.target;
        btn.disabled = true; btn.textContent = "生成中...";

        try {
            const res = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rows: parseInt(rows), cols: parseInt(cols), listName: document.getElementById('dict-select').value })
            });
            const data = await res.json();
            const container = document.getElementById('gen-grid');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            data.grid.forEach(row => row.forEach(cell => {
                const div = document.createElement('div');
                div.className = 'cell' + (cell === '⬛︎' ? ' black' : '');
                div.textContent = cell === '⬛︎' ? '' : cell;
                container.appendChild(div);
            }));
        } catch (e) { alert("生成エラーが発生しました"); }
        btn.disabled = false; btn.textContent = "パズルを生成";
    }

    function initSolverGrid() {
        const r = parseInt(document.getElementById('sol-rows').value);
        const c = parseInt(document.getElementById('sol-cols').value);
        solverPattern = Array.from({ length: r }, () => Array(c).fill(0));
        const container = document.getElementById('sol-grid-editor');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
        document.getElementById('solutions-list').innerHTML = '';

        for(let i=0; i<r; i++) {
            for(let j=0; j<c; j++) {
                const div = document.createElement('div');
                div.className = 'cell interactive black';
                
                const toggle = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    solverPattern[i][j] = solverPattern[i][j] === 0 ? 1 : 0;
                    div.classList.toggle('black');
                };
                
                // タップ遅延をなくすために両方登録
                div.onclick = toggle;
                div.ontouchend = toggle; 
                container.appendChild(div);
            }
        }
    }

    async function runSolver() {
        const btn = event.target;
        btn.disabled = true; btn.textContent = "探索中...";
        try {
            const res = await fetch('/solve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pattern: solverPattern, listName: document.getElementById('dict-select').value })
            });
            const data = await res.json();
            const list = document.getElementById('solutions-list');
            list.innerHTML = data.solutions.length ? '' : '<p class="warning">該当する単語の組み合わせが見つかりませんでした</p>';
            
            data.solutions.forEach((sol, idx) => {
                const item = document.createElement('div');
                item.className = 'solution-item';
                item.innerHTML = `<h4>候補 #${idx+1}</h4>`;
                const g = document.createElement('div');
                g.className = 'grid';
                g.style.gridTemplateColumns = `repeat(${sol[0].length}, 1fr)`;
                sol.forEach(row => row.forEach(c => {
                    const d = document.createElement('div');
                    d.className = 'cell' + (c === '⬛︎' ? ' black' : '');
                    d.textContent = c === '⬛︎' ? '' : c;
                    g.appendChild(d);
                }));
                item.appendChild(g);
                list.appendChild(item);
            });
        } catch (e) { alert("探索エラーが発生しました"); }
        btn.disabled = false; btn.textContent = "解を探索";
    }

    window.onload = initSolverGrid;
</script>
</body>
</html>
