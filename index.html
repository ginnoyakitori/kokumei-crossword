<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クロスワード統合アプリケーション</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; font-size: 16px; cursor: pointer; color: #777; transition: 0.3s; }
        .tab-btn.active { font-weight: bold; color: #3498db; border-bottom: 3px solid #3498db; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; justify-content: center; align-items: center; }
        input, select, button { padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .grid { display: grid; gap: 2px; background-color: #333; padding: 2px; margin: 20px auto; width: max-content; }
        .cell { width: 35px; height: 35px; background-color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; text-transform: uppercase; user-select: none; }
        .cell.black { background-color: #222; color: #222; }
        .cell.interactive { cursor: pointer; }
        .cell.interactive:hover { opacity: 0.8; }
        .warning { color: #e74c3c; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .info { text-align: center; margin-bottom: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>クロスワード・スタジオ</h1>

    <div class="controls" style="background:#eef; padding: 10px; border-radius: 8px;">
        <label>共通辞書リスト: 
            <select id="dictionary-select">
                <option value="pokemon">ポケモン</option>
                <option value="countries">国名</option>
                <option value="capitals">首都</option>
                <option value="countries_capitals">国名＆首都</option>
            </select>
        </label>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('generator')">生成モード (孤立ブロック優先)</button>
        <button class="tab-btn" onclick="switchTab('solver')">解法モード (MCV/LCVパターン)</button>
    </div>

    <div id="generator" class="tab-content active">
        <div class="controls">
            <label>行: <input type="number" id="gen-rows" value="8" min="5" max="20" style="width:60px"></label>
            <label>列: <input type="number" id="gen-cols" value="8" min="5" max="20" style="width:60px"></label>
            <button onclick="runGenerator()">パズルを生成</button>
        </div>
        <div id="gen-warning" class="warning"></div>
        <div id="gen-info" class="info"></div>
        <div id="gen-grid" class="grid"></div>
    </div>

    <div id="solver" class="tab-content">
        <div class="info">盤面をクリックして白マス（文字）と黒マス（壁）を切り替えてください。</div>
        <div class="controls">
            <label>行: <input type="number" id="sol-rows" value="6" min="3" max="15" style="width:60px" onchange="initSolverGrid()"></label>
            <label>列: <input type="number" id="sol-cols" value="6" min="3" max="15" style="width:60px" onchange="initSolverGrid()"></label>
            <button onclick="runSolver()">パターンを解く</button>
        </div>
        <div id="sol-warning" class="warning"></div>
        <div id="sol-info" class="info"></div>
        <div id="sol-grid" class="grid"></div>
    </div>
</div>

<script>
    let solverPattern = [];

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabId === 'solver' && solverPattern.length === 0) initSolverGrid();
    }

    function renderGrid(containerId, gridData) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!gridData || gridData.length === 0) return;
        
        const rows = gridData.length;
        const cols = gridData[0].length;
        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cellDiv = document.createElement('div');
                const char = gridData[r][c];
                cellDiv.className = 'cell';
                if (char === '⬛︎' || char === ' ') {
                    cellDiv.classList.add('black');
                } else {
                    cellDiv.textContent = char;
                }
                container.appendChild(cellDiv);
            }
        }
    }

    // --- ジェネレーター用ロジック ---
    async function runGenerator() {
        const rows = document.getElementById('gen-rows').value;
        const cols = document.getElementById('gen-cols').value;
        const listName = document.getElementById('dictionary-select').value;
        
        document.getElementById('gen-warning').textContent = '';
        document.getElementById('gen-info').textContent = '生成中...';
        
        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rows: parseInt(rows), cols: parseInt(cols), listName })
            });
            const data = await response.json();
            
            if (data.warning) document.getElementById('gen-warning').textContent = data.warning;
            document.getElementById('gen-info').textContent = `配置単語数: ${data.placedWords.length}語`;
            renderGrid('gen-grid', data.grid);
        } catch (err) {
            document.getElementById('gen-warning').textContent = 'エラーが発生しました。';
        }
    }

    // --- ソルバー用ロジック ---
    function initSolverGrid() {
        const rows = parseInt(document.getElementById('sol-rows').value);
        const cols = parseInt(document.getElementById('sol-cols').value);
        solverPattern = Array.from({ length: rows }, () => Array(cols).fill(1)); // 1: 白(文字), 0: 黒(壁)
        drawSolverPatternGrid();
    }

    function drawSolverPatternGrid() {
        const container = document.getElementById('sol-grid');
        container.innerHTML = '';
        const rows = solverPattern.length;
        const cols = solverPattern[0].length;
        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell interactive';
                if (solverPattern[r][c] === 0) cellDiv.classList.add('black');
                
                cellDiv.onclick = () => {
                    solverPattern[r][c] = solverPattern[r][c] === 1 ? 0 : 1;
                    drawSolverPatternGrid();
                };
                container.appendChild(cellDiv);
            }
        }
    }

    async function runSolver() {
        const listName = document.getElementById('dictionary-select').value;
        document.getElementById('sol-warning').textContent = '';
        document.getElementById('sol-info').textContent = '解析中...';
        
        try {
            const response = await fetch('/solve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pattern: solverPattern, listName })
            });
            const data = await response.json();
            
            if (data.warning) {
                document.getElementById('sol-warning').textContent = data.warning;
                document.getElementById('sol-info').textContent = '';
            } else if (data.solutions && data.solutions.length > 0) {
                document.getElementById('sol-info').textContent = `解が見つかりました！（${data.solutions.length}パターン表示）`;
                // 最初の解を描画（UIクリックを無効化するためrenderGridを使用）
                renderGrid('sol-grid', data.solutions[0]);
                
                // もう一度パターンを編集したい場合のためにボタンを残す
                const resetBtn = document.createElement('button');
                resetBtn.textContent = 'パターン編集に戻る';
                resetBtn.style.marginTop = '10px';
                resetBtn.onclick = () => { drawSolverPatternGrid(); document.getElementById('sol-info').textContent = ''; resetBtn.remove(); };
                document.getElementById('sol-info').appendChild(document.createElement('br'));
                document.getElementById('sol-info').appendChild(resetBtn);
            }
        } catch (err) {
            document.getElementById('sol-warning').textContent = 'エラーが発生しました。';
        }
    }

    // 初期化
    initSolverGrid();
</script>
</body>
</html>
